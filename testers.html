<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testers — Asian Tier List [1.8+]</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<main>
  <section class="page-hero">
    <div class="container">
      <div class="eyebrow">Verified evaluators</div>
      <h1 class="h-title" style="font-size:clamp(32px,5vw,52px);">Testers</h1>
      <p class="h-sub">Testers evaluate candidates and issue official tiers. Every tester is assigned specific gamemodes they're certified to test.</p>
    </div>
  </section>

  <section class="section">
    <div class="container" style="display:grid; grid-template-columns: 1fr 340px; gap:28px; align-items:flex-start;">
      <div id="testerContainer"></div>

      <div class="glass card" style="position:sticky; top:calc(var(--nav-h)+20px);">
        <div class="eyebrow">Get ranked</div>
        <h3 style="margin-top:8px;">Request a test</h3>
        <p class="text-sm text-muted">Pick a gamemode and submit a request. A tester certified for that mode will pick it up.</p>
        <div class="field mt-16">
          <label for="gmSelect">Gamemode</label>
          <select class="select" id="gmSelect"></select>
        </div>
        <div class="field">
          <label for="reqNote">Note to tester (optional)</label>
          <textarea class="textarea" id="reqNote" placeholder="Preferred time, your in-game name, past tier, etc."></textarea>
        </div>
        <button class="btn btn-primary btn-block" id="submitReq">Submit Request</button>
        <p class="text-sm text-muted mt-16" id="reqGate"></p>
      </div>
    </div>
  </section>
</main>

<script src="assets/js/data.js"></script>
<script src="assets/js/session.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/backgrounds.js"></script>
<script type="module">
  ATL_mountBackground('testers');
  const session = ATL_initShell('testers.html');

  document.getElementById('gmSelect').innerHTML = ATL_DATA.GAMEMODES.map(g=>`<option value="${g.id}">${g.label}</option>`).join('');

  const testers = await ATL_SESSION.loadStore('testers', []);
  const container = document.getElementById('testerContainer');
  if(testers.length === 0){
    container.innerHTML = `
      <div class="glass empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M12 2l3 6 6 1-4.5 4.5L18 20l-6-3-6 3 1.5-6.5L3 9l6-1z"/></svg>
        <h3>No testers assigned yet</h3>
        <p>The Owner Panel hasn't assigned anyone as a tester. Once testers are added and given gamemodes, they'll appear here.</p>
      </div>`;
  } else {
    const groups = ATL_DATA.TESTER_RANKS.map(rank => ({ rank, members: testers.filter(t=>t.rank===rank) })).filter(g=>g.members.length);
    container.innerHTML = groups.map(g=>`
      <div class="mt-32">
        <div class="eyebrow" style="margin-bottom:14px;">${g.rank} · ${g.members.length}</div>
        <div class="grid-2">
          ${g.members.map(m=>`
            <div class="glass card">
              <div style="display:flex; align-items:center; gap:12px;">
                <img src="${m.avatar || `https://api.dicebear.com/7.x/identicon/svg?seed=${encodeURIComponent(m.username)}&backgroundColor=141a29`}" style="width:48px;height:48px;border-radius:50%;border:2px solid var(--panel-3);">
                <div>
                  <div style="font-family:var(--f-sub); font-weight:700; color:var(--text-0);">${m.display || m.username}</div>
                  ${ATL_roleBadge(m.rank)}
                </div>
              </div>
              <div class="mt-16" style="display:flex; flex-wrap:wrap; gap:6px;">
                ${(m.gamemodes||[]).map(gm=>`<span class="pill pill-blue">${(ATL_DATA.GAMEMODES.find(x=>x.id===gm)||{label:gm}).label}</span>`).join('') || '<span class="text-sm text-muted">No gamemodes assigned</span>'}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  const gate = document.getElementById('reqGate');
  const submitBtn = document.getElementById('submitReq');
  if(!session.authenticated){
    gate.textContent = 'Login with Discord to submit a test request.';
    submitBtn.disabled = true;
  }
  submitBtn.addEventListener('click', async ()=>{
    const gm = document.getElementById('gmSelect').value;
    const requests = await ATL_SESSION.loadStore('test_requests', []);
    requests.push({ id: Date.now(), user: session.user.username, gamemode: gm, note: document.getElementById('reqNote').value, status:'pending', date: new Date().toISOString().slice(0,10) });
    await ATL_SESSION.saveStore('test_requests', requests);
    document.getElementById('reqNote').value = '';
    ATL_toast('Test request submitted. A tester will reach out.', 'success');
  });
</script>
</body>
</html>
