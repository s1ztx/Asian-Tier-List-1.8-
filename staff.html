<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff — Asian Tier List [1.8+]</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<main>
  <section class="page-hero">
    <div class="container">
      <div class="eyebrow">The team</div>
      <h1 class="h-title" style="font-size:clamp(32px,5vw,52px);">Staff</h1>
      <p class="h-sub">Everyone keeping the platform, the server, and the tier system running fairly.</p>
    </div>
  </section>

  <section class="section">
    <div class="container" id="staffContainer"></div>
  </section>
</main>

<script src="assets/js/data.js"></script>
<script src="assets/js/session.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/backgrounds.js"></script>
<script type="module">
  ATL_mountBackground('staff');
  ATL_initShell('staff.html');

  const staff = await ATL_SESSION.loadStore('staff', []);
  const container = document.getElementById('staffContainer');

  if(staff.length === 0){
    container.innerHTML = `
      <div class="glass empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <h3>No staff members added yet</h3>
        <p>The Owner Panel hasn't added anyone to the roster. Once staff are added and assigned a role, they'll be listed here grouped by rank.</p>
      </div>`;
  } else {
    const groups = ATL_DATA.STAFF_ROLES.map(role => ({ role, members: staff.filter(s=>s.role===role) })).filter(g=>g.members.length);
    container.innerHTML = groups.map(g=>`
      <div class="mt-32">
        <div class="eyebrow" style="margin-bottom:14px;">${g.role} · ${g.members.length}</div>
        <div class="grid-3">
          ${g.members.map(m=>`
            <div class="glass card card-hover" style="text-align:center;">
              <img src="${m.avatar || `https://api.dicebear.com/7.x/identicon/svg?seed=${encodeURIComponent(m.username)}&backgroundColor=141a29`}" style="width:64px;height:64px;border-radius:50%;margin:0 auto 12px;border:2px solid var(--panel-3);">
              <div style="font-family:var(--f-sub); font-weight:700; font-size:16px; color:var(--text-0);">${m.display || m.username}</div>
              <div class="mt-8">${ATL_roleBadge(m.role)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
