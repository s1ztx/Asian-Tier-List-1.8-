<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tester Panel — Asian Tier List [1.8+]</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<main>
  <section class="page-hero" style="padding-bottom:24px;">
    <div class="container">
      <div class="eyebrow">Testing operations</div>
      <h1 class="h-title" style="font-size:clamp(30px,4.6vw,44px);">Tester Panel</h1>
      <p class="h-sub">Manage incoming test requests and log tier results. Visible to Tester rank and above.</p>
    </div>
  </section>

  <section class="section" style="padding-top:0;">
    <div class="container" id="panelRoot"></div>
  </section>
</main>

<div class="modal-backdrop" id="formModal">
  <div class="glass modal" id="formModalInner"></div>
</div>

<script src="assets/js/data.js"></script>
<script src="assets/js/session.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/backgrounds.js"></script>
<script type="module">
  ATL_mountBackground('tester-panel');
  const session = ATL_initShell('tester-panel.html');
  const root = document.getElementById('panelRoot');
  const canReviewApps = ATL_DATA.hasAtLeast(session.role, 'Testing Manager');

  function openModal(html){ document.getElementById('formModalInner').innerHTML = html; document.getElementById('formModal').classList.add('open'); }
  function closeModal(){ document.getElementById('formModal').classList.remove('open'); }
  document.getElementById('formModal').addEventListener('click', e=>{ if(e.target.id==='formModal') closeModal(); });

  async function audit(action, detail){
    const log = await ATL_SESSION.loadStore('audit_log', []);
    log.push({ action, detail, actor: session.user ? session.user.display : 'Unknown', date: new Date().toLocaleString() });
    await ATL_SESSION.saveStore('audit_log', log);
  }

  if(!ATL_DATA.hasAtLeast(session.role, 'Tester')){
    root.innerHTML = `
      <div class="glass empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
        <h3>Tester access required</h3>
        <p>This panel is restricted to members holding the Tester role or higher. ${session.authenticated ? "Your current role is "+session.role+"." : "Login with Discord to check your role."}</p>
        ${!session.authenticated ? '<button class="btn btn-primary mt-16" id="tpLogin">Login with Discord</button>' : ''}
      </div>`;
    const btn = document.getElementById('tpLogin');
    if(btn) btn.addEventListener('click', ATL_SESSION.loginWithDiscord);
  } else {
    root.innerHTML = `
    <div class="panel-shell">
      <nav class="glass panel-nav">
        <div class="panel-nav-group">
          <h5>Overview</h5>
          <div class="panel-tab active" data-view="dashboard">Dashboard</div>
        </div>
        <div class="panel-nav-group">
          <h5>Testing</h5>
          <div class="panel-tab" data-view="requests">Test Requests</div>
          <div class="panel-tab" data-view="submit">Submit Tier Result</div>
        </div>
        ${canReviewApps ? `
        <div class="panel-nav-group">
          <h5>Management</h5>
          <div class="panel-tab" data-view="applications">Tester Applications</div>
        </div>` : ''}
        <div class="panel-nav-group">
          <h5>My assignment</h5>
          <div class="panel-tab" data-view="profile">My Certification</div>
        </div>
      </nav>
      <div>
        <div class="panel-view active" id="view-dashboard">
          <div class="grid-4" id="tpStats"></div>
          <div class="glass card mt-24">
            <div class="eyebrow">Quick actions</div>
            <div class="mt-16" style="display:flex; gap:12px; flex-wrap:wrap;">
              <button class="btn btn-secondary btn-sm" data-goto="requests" style="text-transform:none;">Review requests</button>
              <button class="btn btn-secondary btn-sm" data-goto="submit" style="text-transform:none;">Log a tier result</button>
              ${canReviewApps ? '<button class="btn btn-ghost btn-sm" data-goto="applications" style="text-transform:none;">Review tester applications</button>' : ''}
            </div>
          </div>
        </div>

        <div class="panel-view" id="view-requests">
          <div class="table-wrap glass" id="requestsWrap"></div>
        </div>

        <div class="panel-view" id="view-submit">
          <div class="glass card" style="max-width:560px;">
            <div class="eyebrow">Log result</div>
            <h3 class="mt-8">Submit a tier result</h3>
            <div class="field mt-16"><label>Player Discord username</label><input class="input" id="subPlayer" placeholder="e.g. kairo_ace"></div>
            <div class="field"><label>Gamemode</label><select class="select" id="subGm">${ATL_DATA.GAMEMODES.map(g=>`<option value="${g.id}">${g.label}</option>`).join('')}</select></div>
            <div class="field"><label>Tier</label><select class="select" id="subTier">${ATL_DATA.TIERS.map(t=>`<option value="${t.id}">${t.id} — ${t.desc}</option>`).join('')}</select></div>
            <button class="btn btn-primary btn-block" id="submitTier">Log Tier Result</button>
          </div>
        </div>

        <div class="panel-view" id="view-applications">
          <div class="table-wrap glass" id="testerAppsWrap"></div>
        </div>

        <div class="panel-view" id="view-profile">
          <div class="glass card">
            <div class="eyebrow">Certification</div>
            <h3 class="mt-8">${session.user.display}'s testing certification</h3>
            <div class="mt-16">${ATL_roleBadge(session.role)}</div>
            <p class="text-sm text-muted mt-16">Gamemode certifications are assigned by the Owner Panel. This account isn't linked to a tester roster entry yet in this demo session.</p>
          </div>
        </div>
      </div>
    </div>`;

    root.querySelectorAll('.panel-tab, [data-goto]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const target = el.dataset.view || el.dataset.goto;
        root.querySelectorAll('.panel-tab').forEach(t=>t.classList.toggle('active', t.dataset.view===target));
        root.querySelectorAll('.panel-view').forEach(v=>v.classList.toggle('active', v.id==='view-'+target));
        if(target==='applications') renderTesterApplications();
      });
    });

    const requests = await ATL_SESSION.loadStore('test_requests', []);
    const pending = requests.filter(r=>r.status==='pending');
    const tierLogForStats = await ATL_SESSION.loadStore('tier_log', []);
    document.getElementById('tpStats').innerHTML = [
      [pending.length, 'Pending requests'],
      [requests.length, 'Total requests'],
      [tierLogForStats.length, 'Tiers logged'],
      [session.role, 'Your rank']
    ].map(([v,l])=>`<div class="glass stat-card"><div class="s-val" style="font-size:22px;">${v}</div><div class="s-label">${l}</div></div>`).join('');

    const reqWrap = document.getElementById('requestsWrap');
    if(requests.length === 0){
      reqWrap.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M4 4h16v16H4z"/></svg><h3>No test requests</h3><p>Nothing in the queue right now.</p></div>`;
    } else {
      reqWrap.innerHTML = `<table class="dt"><thead><tr><th>Player</th><th>Gamemode</th><th>Note</th><th>Status</th><th>Date</th></tr></thead>
      <tbody>${requests.slice().reverse().map(r=>`<tr><td>${r.user}</td><td>${(ATL_DATA.GAMEMODES.find(g=>g.id===r.gamemode)||{label:r.gamemode}).label}</td><td class="text-muted">${r.note||'—'}</td><td><span class="pill ${r.status==='pending'?'pill-gold':'pill-teal'}">${r.status}</span></td><td class="mono text-muted">${r.date}</td></tr>`).join('')}</tbody></table>`;
    }

    document.getElementById('submitTier').addEventListener('click', async ()=>{
      const player = document.getElementById('subPlayer').value.trim();
      if(!player){ ATL_toast('Enter a player username.', 'error'); return; }
      const gm = document.getElementById('subGm').value;
      const tier = document.getElementById('subTier').value;
      const log = await ATL_SESSION.loadStore('tier_log', []);
      log.push({ player, gamemode:gm, tier, tester:session.user.display, date:new Date().toISOString().slice(0,10) });
      await ATL_SESSION.saveStore('tier_log', log);
      const board = await ATL_SESSION.loadStore('leaderboard_'+gm, []);
      const existingIdx = board.findIndex(b=>b.player===player);
      const entry = { player, tier, tester:session.user.display, date:new Date().toISOString().slice(0,10) };
      if(existingIdx>=0) board[existingIdx]=entry; else board.push(entry);
      await ATL_SESSION.saveStore('leaderboard_'+gm, board);
      document.getElementById('subPlayer').value='';
      ATL_toast(`Logged ${player} as ${tier} in ${gm}.`, 'success');
    });
  }

  /* ---------------- TESTER APPLICATIONS (review, Testing Manager+) ---------------- */
  async function renderTesterApplications(){
    if(!canReviewApps) return;
    const all = await ATL_SESSION.loadStore('applications', []);
    const apps = all.map((a,i)=>({ ...a, _idx: i })).filter(a=>a.track==='tester');
    const wrap = document.getElementById('testerAppsWrap');
    if(!wrap) return;

    if(apps.length===0){
      wrap.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M12 2l3 6 6 1-4.5 4.5L18 20l-6-3-6 3 1.5-6.5L3 9l6-1z"/></svg><h3>No tester applications</h3><p>Submissions from the Applications page will show up here for review.</p></div>`;
      return;
    }

    wrap.innerHTML = `<table class="dt"><thead><tr><th>Applicant</th><th>Gamemodes requested</th><th>Submitted</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${apps.slice().reverse().map(a=>`
      <tr>
        <td>${a.username}</td>
        <td>${(a.gamemodes||[]).map(gm=>`<span class="pill pill-teal">${(ATL_DATA.GAMEMODES.find(g=>g.id===gm)||{label:gm}).label}</span>`).join(' ')||'<span class="text-muted text-sm">None</span>'}</td>
        <td class="mono text-muted">${a.submitted}</td>
        <td><span class="pill ${a.status==='approved'?'pill-teal':a.status==='rejected'?'pill-red':'pill-gold'}">${a.status}</span></td>
        <td style="display:flex; gap:6px; flex-wrap:wrap;">
          <button class="btn btn-ghost btn-sm" data-view-app="${a._idx}" style="text-transform:none;">View</button>
          <button class="btn btn-secondary btn-sm" data-approve="${a._idx}" style="text-transform:none;" ${a.status!=='pending'?'disabled':''}>Approve</button>
          <button class="btn btn-outline-red btn-sm" data-reject="${a._idx}" style="text-transform:none;" ${a.status!=='pending'?'disabled':''}>Reject</button>
        </td>
      </tr>`).join('')}</tbody></table>`;

    wrap.querySelectorAll('[data-view-app]').forEach(b=> b.addEventListener('click', ()=>{
      const a = all[+b.dataset.viewApp];
      openModal(`
        <div class="modal-head"><h3>${a.username}'s application</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="field"><label>Age</label><p class="text-sm">${a.age}</p></div>
        <div class="field"><label>Timezone</label><p class="text-sm">${a.timezone}</p></div>
        <div class="field"><label>Gamemodes requested</label><p class="text-sm">${(a.gamemodes||[]).map(gm=>(ATL_DATA.GAMEMODES.find(g=>g.id===gm)||{label:gm}).label).join(', ')||'—'}</p></div>
        <div class="field"><label>Why they want to test</label><p class="text-sm text-muted">${a.why||'—'}</p></div>
        <div class="field"><label>Relevant experience</label><p class="text-sm text-muted">${a.experience||'—'}</p></div>
        <div class="field"><label>Scenario 1</label><p class="text-sm text-muted">${a.scenario1||'—'}</p></div>
        <div class="field"><label>Scenario 2</label><p class="text-sm text-muted">${a.scenario2||'—'}</p></div>
      `);
    }));
    wrap.querySelectorAll('[data-approve]').forEach(b=> b.addEventListener('click', ()=>{
      const idx = +b.dataset.approve;
      approveTesterApplication(all[idx], idx, all);
    }));
    wrap.querySelectorAll('[data-reject]').forEach(b=> b.addEventListener('click', async ()=>{
      const idx = +b.dataset.reject;
      all[idx].status = 'rejected';
      await ATL_SESSION.saveStore('applications', all);
      await audit('Rejected tester application', all[idx].username);
      ATL_toast('Application rejected.', 'success');
      renderTesterApplications();
    }));
  }

  function approveTesterApplication(app, idx, all){
    openModal(`
      <div class="modal-head"><h3>Approve ${app.username}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <p class="text-sm text-muted">This adds them to the Testers roster as a Tester, certified for the gamemodes they requested.</p>
      <div class="field mt-16"><label>Certified gamemodes</label>
        <div style="display:flex; flex-wrap:wrap; gap:8px;">
          ${ATL_DATA.GAMEMODES.map(g=>`<label class="checkbox-row" style="background:var(--panel-2); padding:6px 10px; border-radius:var(--r-full); border:1px solid var(--glass-brd);">
            <input type="checkbox" value="${g.id}" class="approveGm" ${(app.gamemodes||[]).includes(g.id)?'checked':''}> <span>${g.label}</span>
          </label>`).join('')}
        </div>
      </div>
      <button class="btn btn-secondary btn-block mt-16" id="confirmApproveTester">Approve &amp; Add to Testers</button>
    `);
    document.getElementById('confirmApproveTester').addEventListener('click', async ()=>{
      const gamemodes = Array.from(document.querySelectorAll('.approveGm:checked')).map(c=>c.value);
      const testers = await ATL_SESSION.loadStore('testers', []);
      testers.push({ username: app.username, display: app.username, rank:'Tester', gamemodes });
      await ATL_SESSION.saveStore('testers', testers);
      all[idx].status = 'approved';
      await ATL_SESSION.saveStore('applications', all);
      await audit('Approved tester application', app.username);
      closeModal();
      ATL_toast(`${app.username} added to Testers.`, 'success');
      renderTesterApplications();
    });
  }
</script>
</body>
</html>
