<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboards — Asian Tier List [1.8+]</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<main>
  <section class="page-hero">
    <div class="container">
      <div class="eyebrow">Live rankings</div>
      <h1 class="h-title" style="font-size:clamp(32px,5vw,52px);">Leaderboards</h1>
      <p class="h-sub">Every gamemode has its own leaderboard. Rankings update the moment a tester logs a new result.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div id="gmTabs" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:22px;"></div>
      <div class="table-wrap glass" id="lbTableWrap"></div>
    </div>
  </section>
</main>

<script src="assets/js/data.js"></script>
<script src="assets/js/session.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/backgrounds.js"></script>
<script>
  ATL_mountBackground('leaderboards');
  ATL_initShell('leaderboards.html');

  const tabsEl = document.getElementById('gmTabs');
  const tableWrap = document.getElementById('lbTableWrap');
  let active = ATL_DATA.GAMEMODES[0].id;

  function render(){
    tabsEl.innerHTML = ATL_DATA.GAMEMODES.map(g=>`
      <button class="btn ${g.id===active?'btn-secondary':'btn-ghost'} btn-sm" data-gm="${g.id}" style="text-transform:none;">${g.label}</button>
    `).join('');
    tabsEl.querySelectorAll('[data-gm]').forEach(b=> b.addEventListener('click', ()=>{ active=b.dataset.gm; render(); }));

    const board = ATL_SESSION.loadStore('leaderboard_'+active, []);
    if(board.length === 0){
      tableWrap.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
          <h3>No ranked players yet</h3>
          <p>Nobody has been tiered in ${ATL_DATA.GAMEMODES.find(g=>g.id===active).label} yet. Request a test to be the first on this board.</p>
        </div>`;
    } else {
      const tierOrder = ATL_DATA.TIERS.map(t=>t.id);
      const sorted = board.slice().sort((a,b)=> tierOrder.indexOf(a.tier) - tierOrder.indexOf(b.tier));
      tableWrap.innerHTML = `
        <table class="dt">
          <thead><tr><th>#</th><th>Player</th><th>Tier</th><th>Tested by</th><th>Date</th></tr></thead>
          <tbody>
            ${sorted.map((p,i)=>`
              <tr class="${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}">
                <td><span class="rank-num">${i+1}</span></td>
                <td>${p.player}</td>
                <td>${ATL_hex(p.tier,'sm')}</td>
                <td class="text-muted">${p.tester}</td>
                <td class="mono text-muted">${p.date}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }
  }
  render();
</script>
</body>
</html>
