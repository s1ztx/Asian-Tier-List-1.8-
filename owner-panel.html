<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Panel — Asian Tier List [1.8+]</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<main>
  <section class="page-hero" style="padding-bottom:24px;">
    <div class="container">
      <div class="eyebrow">Command center</div>
      <h1 class="h-title" style="font-size:clamp(30px,4.6vw,44px);">Owner Panel</h1>
      <p class="h-sub">Full control over staff, testers, content, and platform settings. Visible to Owner and Founder only.</p>
    </div>
  </section>
  <section class="section" style="padding-top:0;">
    <div class="container" id="panelRoot"></div>
  </section>
</main>

<div class="modal-backdrop" id="formModal">
  <div class="glass modal" id="formModalInner"></div>
</div>

<script src="assets/js/data.js"></script>
<script src="assets/js/session.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/backgrounds.js"></script>
<script>
ATL_mountBackground('owner-panel');
const session = ATL_initShell('owner-panel.html');
const root = document.getElementById('panelRoot');

if(!ATL_DATA.hasAtLeast(session.role, 'Owner')){
  root.innerHTML = `
    <div class="glass empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
      <h3>Owner access required</h3>
      <p>This panel is restricted to Owner and Founder. ${session.authenticated ? "Your current role is "+session.role+"." : "Login with Discord to check your role."}</p>
      ${!session.authenticated ? '<button class="btn btn-primary mt-16" id="opLogin">Login with Discord</button>' : ''}
    </div>`;
  const b = document.getElementById('opLogin'); if(b) b.addEventListener('click', ATL_SESSION.loginWithDiscord);
} else {
  buildPanel();
}

function audit(action, detail){
  const log = ATL_SESSION.loadStore('audit_log', []);
  log.push({ action, detail, actor: session.user.display, date: new Date().toLocaleString() });
  ATL_SESSION.saveStore('audit_log', log);
}
function openModal(html){ document.getElementById('formModalInner').innerHTML = html; document.getElementById('formModal').classList.add('open'); }
function closeModal(){ document.getElementById('formModal').classList.remove('open'); }
document.getElementById('formModal').addEventListener('click', e=>{ if(e.target.id==='formModal') closeModal(); });

function buildPanel(){
  root.innerHTML = `
  <div class="panel-shell">
    <nav class="glass panel-nav">
      <div class="panel-nav-group"><h5>Overview</h5>
        <div class="panel-tab active" data-view="dashboard">Dashboard</div>
        <div class="panel-tab" data-view="analytics">Analytics</div>
        <div class="panel-tab" data-view="statistics">Statistics</div>
      </div>
      <div class="panel-nav-group"><h5>People</h5>
        <div class="panel-tab" data-view="staff">Manage Staff</div>
        <div class="panel-tab" data-view="staffApps">Staff Applications</div>
        <div class="panel-tab" data-view="testers">Manage Testers</div>
      </div>
      <div class="panel-nav-group"><h5>Content</h5>
        <div class="panel-tab" data-view="announcements">Announcements</div>
        <div class="panel-tab" data-view="reviews">Reviews</div>
        <div class="panel-tab" data-view="leaderboards">Leaderboards</div>
        <div class="panel-tab" data-view="rules">Rules</div>
      </div>
      <div class="panel-nav-group"><h5>System</h5>
        <div class="panel-tab" data-view="settings">Website Settings</div>
        <div class="panel-tab" data-view="audit">Audit Logs</div>
      </div>
    </nav>
    <div>
      <div class="panel-view active" id="view-dashboard"></div>
      <div class="panel-view" id="view-analytics"></div>
      <div class="panel-view" id="view-statistics"></div>
      <div class="panel-view" id="view-staff"></div>
      <div class="panel-view" id="view-staffApps"></div>
      <div class="panel-view" id="view-testers"></div>
      <div class="panel-view" id="view-announcements"></div>
      <div class="panel-view" id="view-reviews"></div>
      <div class="panel-view" id="view-leaderboards"></div>
      <div class="panel-view" id="view-rules"></div>
      <div class="panel-view" id="view-settings"></div>
      <div class="panel-view" id="view-audit"></div>
    </div>
  </div>`;

  root.querySelectorAll('.panel-tab').forEach(t=> t.addEventListener('click', ()=>{
    root.querySelectorAll('.panel-tab').forEach(x=>x.classList.toggle('active', x===t));
    root.querySelectorAll('.panel-view').forEach(v=>v.classList.toggle('active', v.id==='view-'+t.dataset.view));
    renderView(t.dataset.view);
  }));

  renderView('dashboard');
}

function counts(){
  const apps = ATL_SESSION.loadStore('applications', []);
  return {
    staff: ATL_SESSION.loadStore('staff', []).length,
    testers: ATL_SESSION.loadStore('testers', []).length,
    announcements: ATL_SESSION.loadStore('announcements', []).length,
    reviews: ATL_SESSION.loadStore('reviews', []).length,
    requests: ATL_SESSION.loadStore('test_requests', []).length,
    tiersLogged: ATL_SESSION.loadStore('tier_log', []).length,
    audit: ATL_SESSION.loadStore('audit_log', []).length,
    pendingStaffApps: apps.filter(a=>a.track==='staff' && a.status==='pending').length,
  };
}

function renderView(view){
  const c = counts();
  if(view==='dashboard'){
    document.getElementById('view-dashboard').innerHTML = `
      <div class="grid-4">
        <div class="glass stat-card"><div class="s-val">${c.staff}</div><div class="s-label">Staff members</div></div>
        <div class="glass stat-card"><div class="s-val">${c.testers}</div><div class="s-label">Testers</div></div>
        <div class="glass stat-card"><div class="s-val">${c.requests}</div><div class="s-label">Test requests</div></div>
        <div class="glass stat-card"><div class="s-val">${c.pendingStaffApps}</div><div class="s-label">Pending staff applications</div></div>
      </div>
      <div class="glass card mt-24">
        <div class="eyebrow">Quick actions</div>
        <div class="mt-16" style="display:flex; gap:12px; flex-wrap:wrap;">
          <button class="btn btn-primary btn-sm" style="text-transform:none;" data-goto="staff">+ Add staff</button>
          <button class="btn btn-secondary btn-sm" style="text-transform:none;" data-goto="testers">+ Add tester</button>
          <button class="btn btn-ghost btn-sm" style="text-transform:none;" data-goto="staffApps">Review applications</button>
          <button class="btn btn-ghost btn-sm" style="text-transform:none;" data-goto="announcements">+ Post announcement</button>
          <button class="btn btn-ghost btn-sm" style="text-transform:none;" data-goto="settings">Website settings</button>
        </div>
      </div>
      <div class="glass card mt-24">
        <div class="eyebrow">Recent activity</div>
        <div class="mt-16" id="dashRecent"></div>
      </div>`;
    const recent = ATL_SESSION.loadStore('audit_log', []).slice(-5).reverse();
    document.getElementById('dashRecent').innerHTML = recent.length ? recent.map(a=>`<div class="rule-item" style="border-bottom:1px solid var(--hairline); padding:10px 0;"><span class="text-sm">${a.action} — <span class="text-muted">${a.detail}</span></span><span class="text-sm text-muted mono" style="margin-left:auto;">${a.date}</span></div>`).join('') : '<p class="text-sm text-muted">No actions logged yet this session.</p>';
    document.getElementById('view-dashboard').querySelectorAll('[data-goto]').forEach(b=> b.addEventListener('click', ()=>{
      const tab = root.querySelector(`.panel-tab[data-view="${b.dataset.goto}"]`); if(tab) tab.click();
    }));
  }

  if(view==='analytics'){
    document.getElementById('view-analytics').innerHTML = `
      <div class="glass card">
        <div class="eyebrow">Platform analytics</div>
        <h3 class="mt-8">Requests by gamemode</h3>
        <div class="mt-24" id="analyticsBars" style="display:flex; flex-direction:column; gap:12px;"></div>
      </div>`;
    const requests = ATL_SESSION.loadStore('test_requests', []);
    const max = Math.max(1, ...ATL_DATA.GAMEMODES.map(g=> requests.filter(r=>r.gamemode===g.id).length));
    document.getElementById('analyticsBars').innerHTML = ATL_DATA.GAMEMODES.map(g=>{
      const n = requests.filter(r=>r.gamemode===g.id).length;
      const pct = Math.round((n/max)*100);
      return `<div>
        <div class="flex-between text-sm"><span>${g.label}</span><span class="text-muted mono">${n}</span></div>
        <div style="height:8px; border-radius:6px; background:var(--panel-3); margin-top:6px; overflow:hidden;">
          <div style="height:100%; width:${pct}%; background:linear-gradient(90deg, var(--red-500), var(--blue-500));"></div>
        </div>
      </div>`;
    }).join('');
  }

  if(view==='statistics'){
    document.getElementById('view-statistics').innerHTML = `
      <div class="grid-3">
        <div class="glass stat-card"><div class="s-val">${c.announcements}</div><div class="s-label">Announcements posted</div></div>
        <div class="glass stat-card"><div class="s-val">${c.reviews}</div><div class="s-label">Reviews submitted</div></div>
        <div class="glass stat-card"><div class="s-val">${c.audit}</div><div class="s-label">Logged owner actions</div></div>
      </div>
      <div class="glass card mt-24">
        <div class="eyebrow">Tier distribution</div>
        <div class="mt-16" style="display:flex; gap:6px; flex-wrap:wrap;" id="tierDist"></div>
      </div>`;
    const log = ATL_SESSION.loadStore('tier_log', []);
    document.getElementById('tierDist').innerHTML = ATL_DATA.TIERS.map(t=>{
      const n = log.filter(l=>l.tier===t.id).length;
      return `<div style="text-align:center;">${ATL_hex(t.id,'sm')}<div class="text-sm text-muted mono mt-8">${n}</div></div>`;
    }).join('');
  }

  if(view==='staff') renderStaff();
  if(view==='staffApps') renderStaffApplications();
  if(view==='testers') renderTesters();
  if(view==='announcements') renderAnnouncements();
  if(view==='reviews') renderReviewsMod();
  if(view==='leaderboards') renderLeaderboardsMod();
  if(view==='rules') renderRulesMod();
  if(view==='settings') renderSettings();
  if(view==='audit') renderAudit();
}

/* ---------------- STAFF ---------------- */
function renderStaff(){
  const staff = ATL_SESSION.loadStore('staff', []);
  const el = document.getElementById('view-staff');
  el.innerHTML = `
    <div class="flex-between mt-8" style="margin-bottom:16px;">
      <h3 style="margin:0;">Manage Staff</h3>
      <button class="btn btn-primary btn-sm" id="addStaffBtn" style="text-transform:none;">+ Add Staff</button>
    </div>
    <div class="table-wrap glass" id="staffTableWrap"></div>`;
  const wrap = document.getElementById('staffTableWrap');
  if(staff.length===0){
    wrap.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><h3>No staff yet</h3><p>Add your first staff member to populate the Staff page.</p></div>`;
  } else {
    wrap.innerHTML = `<table class="dt"><thead><tr><th>Member</th><th>Role</th><th>Added</th><th>Actions</th></tr></thead>
    <tbody>${staff.map((s,i)=>`
      <tr>
        <td>${s.display||s.username}</td>
        <td>${ATL_roleBadge(s.role)}</td>
        <td class="mono text-muted">${s.added}</td>
        <td style="display:flex; gap:6px; flex-wrap:wrap;">
          <button class="btn btn-ghost btn-sm" data-edit="${i}" style="text-transform:none;">Edit</button>
          <button class="btn btn-ghost btn-sm" data-promote="${i}" style="text-transform:none;">Promote</button>
          <button class="btn btn-ghost btn-sm" data-demote="${i}" style="text-transform:none;">Demote</button>
          <button class="btn btn-outline-red btn-sm" data-delete="${i}" style="text-transform:none;">Delete</button>
        </td>
      </tr>`).join('')}</tbody></table>`;
  }

  document.getElementById('addStaffBtn').addEventListener('click', ()=> staffForm());
  wrap.querySelectorAll('[data-edit]').forEach(b=> b.addEventListener('click', ()=> staffForm(staff[+b.dataset.edit], +b.dataset.edit)));
  wrap.querySelectorAll('[data-delete]').forEach(b=> b.addEventListener('click', ()=>{
    const s = staff[+b.dataset.delete];
    const updated = staff.filter((_,i)=>i!==+b.dataset.delete);
    ATL_SESSION.saveStore('staff', updated);
    audit('Deleted staff', s.display||s.username);
    ATL_toast('Staff member removed.', 'success');
    renderStaff();
  }));
  wrap.querySelectorAll('[data-promote]').forEach(b=> b.addEventListener('click', ()=> shiftRole(+b.dataset.promote, -1)));
  wrap.querySelectorAll('[data-demote]').forEach(b=> b.addEventListener('click', ()=> shiftRole(+b.dataset.demote, 1)));

  function shiftRole(idx, dir){
    const s = staff[idx];
    const roles = ATL_DATA.STAFF_ROLES; // index 0 = Founder (highest)
    const newIdx = Math.min(roles.length-1, Math.max(0, roles.indexOf(s.role)+dir));
    s.role = roles[newIdx];
    ATL_SESSION.saveStore('staff', staff);
    audit(dir<0?'Promoted staff':'Demoted staff', `${s.display||s.username} → ${s.role}`);
    ATL_toast(`${s.display||s.username} is now ${s.role}.`, 'success');
    renderStaff();
  }

  function staffForm(existing, idx){
    openModal(`
      <div class="modal-head"><h3>${existing?'Edit Staff':'Add Staff'}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="field"><label>Discord username</label><input class="input" id="fUsername" value="${existing?existing.username:''}" placeholder="e.g. moon_mod"></div>
      <div class="field"><label>Display name</label><input class="input" id="fDisplay" value="${existing?existing.display||'':''}" placeholder="e.g. Moon"></div>
      <div class="field"><label>Staff role</label><select class="select" id="fRole">${ATL_DATA.STAFF_ROLES.map(r=>`<option ${existing&&existing.role===r?'selected':''}>${r}</option>`).join('')}</select></div>
      <div class="field"><label>Assign Discord role (server sync)</label><input class="input" id="fDiscordRole" value="${existing?existing.discordRole||existing.role:''}" placeholder="Discord role name to sync"><p class="hint">Written to the member's server roles once connected to the bot.</p></div>
      <button class="btn btn-primary btn-block" id="saveStaff">${existing?'Save changes':'Add Staff'}</button>
    `);
    document.getElementById('saveStaff').addEventListener('click', ()=>{
      const username = document.getElementById('fUsername').value.trim();
      if(!username){ ATL_toast('Enter a Discord username.', 'error'); return; }
      const entry = {
        username, display: document.getElementById('fDisplay').value.trim() || username,
        role: document.getElementById('fRole').value,
        discordRole: document.getElementById('fDiscordRole').value.trim(),
        added: existing ? existing.added : new Date().toISOString().slice(0,10)
      };
      let list = ATL_SESSION.loadStore('staff', []);
      if(existing!=null && idx!=null) list[idx]=entry; else list.push(entry);
      ATL_SESSION.saveStore('staff', list);
      audit(existing?'Edited staff':'Added staff', entry.display);
      closeModal(); ATL_toast(existing?'Staff updated.':'Staff added.', 'success');
      renderStaff();
    });
  }
}

/* ---------------- STAFF APPLICATIONS (review) ---------------- */
function renderStaffApplications(){
  const all = ATL_SESSION.loadStore('applications', []);
  const apps = all.map((a,i)=>({ ...a, _idx: i })).filter(a=>a.track==='staff');
  const el = document.getElementById('view-staffApps');
  el.innerHTML = `<div class="table-wrap glass" id="staffAppsWrap"></div>`;
  const wrap = document.getElementById('staffAppsWrap');

  if(apps.length===0){
    wrap.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M4 4h16v16H4z"/></svg><h3>No staff applications</h3><p>Submissions from the Applications page will show up here for review.</p></div>`;
    return;
  }

  wrap.innerHTML = `<table class="dt"><thead><tr><th>Applicant</th><th>Age</th><th>Timezone</th><th>Submitted</th><th>Status</th><th>Actions</th></tr></thead>
  <tbody>${apps.slice().reverse().map(a=>`
    <tr>
      <td>${a.username}</td>
      <td class="mono">${a.age}</td>
      <td class="mono text-muted">${a.timezone}</td>
      <td class="mono text-muted">${a.submitted}</td>
      <td><span class="pill ${a.status==='approved'?'pill-teal':a.status==='rejected'?'pill-red':'pill-gold'}">${a.status}</span></td>
      <td style="display:flex; gap:6px; flex-wrap:wrap;">
        <button class="btn btn-ghost btn-sm" data-view-app="${a._idx}" style="text-transform:none;">View</button>
        <button class="btn btn-secondary btn-sm" data-approve="${a._idx}" style="text-transform:none;" ${a.status!=='pending'?'disabled':''}>Approve</button>
        <button class="btn btn-outline-red btn-sm" data-reject="${a._idx}" style="text-transform:none;" ${a.status!=='pending'?'disabled':''}>Reject</button>
      </td>
    </tr>`).join('')}</tbody></table>`;

  wrap.querySelectorAll('[data-view-app]').forEach(b=> b.addEventListener('click', ()=>{
    const a = all[+b.dataset.viewApp];
    openModal(`
      <div class="modal-head"><h3>${a.username}'s application</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="field"><label>Age</label><p class="text-sm">${a.age}</p></div>
      <div class="field"><label>Timezone</label><p class="text-sm">${a.timezone}</p></div>
      <div class="field"><label>Why they want to join</label><p class="text-sm text-muted">${a.why||'—'}</p></div>
      <div class="field"><label>Relevant experience</label><p class="text-sm text-muted">${a.experience||'—'}</p></div>
      <div class="field"><label>Scenario 1</label><p class="text-sm text-muted">${a.scenario1||'—'}</p></div>
      <div class="field"><label>Scenario 2</label><p class="text-sm text-muted">${a.scenario2||'—'}</p></div>
    `);
  }));
  wrap.querySelectorAll('[data-approve]').forEach(b=> b.addEventListener('click', ()=>{
    const idx = +b.dataset.approve;
    const a = all[idx];
    approveStaffApplication(a, idx, all);
  }));
  wrap.querySelectorAll('[data-reject]').forEach(b=> b.addEventListener('click', ()=>{
    const idx = +b.dataset.reject;
    all[idx].status = 'rejected';
    ATL_SESSION.saveStore('applications', all);
    audit('Rejected staff application', all[idx].username);
    ATL_toast('Application rejected.', 'success');
    renderStaffApplications();
  }));
}

function approveStaffApplication(app, idx, all){
  openModal(`
    <div class="modal-head"><h3>Approve ${app.username}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <p class="text-sm text-muted">Choose their starting staff role. This adds them straight to the Staff roster.</p>
    <div class="field mt-16"><label>Starting role</label>
      <select class="select" id="approveRole">${ATL_DATA.STAFF_ROLES.slice().reverse().map(r=>`<option ${r==='Trial Moderator'?'selected':''}>${r}</option>`).join('')}</select>
    </div>
    <button class="btn btn-primary btn-block" id="confirmApproveStaff">Approve &amp; Add to Staff</button>
  `);
  document.getElementById('confirmApproveStaff').addEventListener('click', ()=>{
    const role = document.getElementById('approveRole').value;
    const staff = ATL_SESSION.loadStore('staff', []);
    staff.push({ username: app.username, display: app.username, role, discordRole: role, added: new Date().toISOString().slice(0,10) });
    ATL_SESSION.saveStore('staff', staff);
    all[idx].status = 'approved';
    ATL_SESSION.saveStore('applications', all);
    audit('Approved staff application', `${app.username} → ${role}`);
    closeModal();
    ATL_toast(`${app.username} added to Staff as ${role}.`, 'success');
    renderStaffApplications();
  });
}

/* ---------------- TESTERS ---------------- */
function renderTesters(){
  const testers = ATL_SESSION.loadStore('testers', []);
  const el = document.getElementById('view-testers');
  el.innerHTML = `
    <div class="flex-between" style="margin-bottom:16px;">
      <h3 style="margin:0;">Manage Testers</h3>
      <button class="btn btn-secondary btn-sm" id="addTesterBtn" style="text-transform:none;">+ Add Tester</button>
    </div>
    <div class="table-wrap glass" id="testerTableWrap"></div>`;
  const wrap = document.getElementById('testerTableWrap');
  if(testers.length===0){
    wrap.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M12 2l3 6 6 1-4.5 4.5L18 20l-6-3-6 3 1.5-6.5L3 9l6-1z"/></svg><h3>No testers yet</h3><p>Add a tester and assign gamemodes to populate the Testers page.</p></div>`;
  } else {
    wrap.innerHTML = `<table class="dt"><thead><tr><th>Tester</th><th>Rank</th><th>Gamemodes</th><th>Actions</th></tr></thead>
    <tbody>${testers.map((t,i)=>`
      <tr>
        <td>${t.display||t.username}</td>
        <td>${ATL_roleBadge(t.rank)}</td>
        <td>${(t.gamemodes||[]).map(gm=>`<span class="pill pill-teal">${(ATL_DATA.GAMEMODES.find(g=>g.id===gm)||{label:gm}).label}</span>`).join(' ')||'<span class="text-muted text-sm">None</span>'}</td>
        <td style="display:flex; gap:6px; flex-wrap:wrap;">
          <button class="btn btn-ghost btn-sm" data-edit="${i}" style="text-transform:none;">Edit / Assign</button>
          <button class="btn btn-ghost btn-sm" data-promote="${i}" style="text-transform:none;">Promote</button>
          <button class="btn btn-ghost btn-sm" data-demote="${i}" style="text-transform:none;">Demote</button>
          <button class="btn btn-outline-red btn-sm" data-remove="${i}" style="text-transform:none;">Remove</button>
        </td>
      </tr>`).join('')}</tbody></table>`;
  }
  document.getElementById('addTesterBtn').addEventListener('click', ()=> testerForm());
  wrap.querySelectorAll('[data-edit]').forEach(b=> b.addEventListener('click', ()=> testerForm(testers[+b.dataset.edit], +b.dataset.edit)));
  wrap.querySelectorAll('[data-remove]').forEach(b=> b.addEventListener('click', ()=>{
    const t = testers[+b.dataset.remove];
    ATL_SESSION.saveStore('testers', testers.filter((_,i)=>i!==+b.dataset.remove));
    audit('Removed tester', t.display||t.username);
    ATL_toast('Tester removed.', 'success');
    renderTesters();
  }));
  wrap.querySelectorAll('[data-promote]').forEach(b=> b.addEventListener('click', ()=> shiftRank(+b.dataset.promote,-1)));
  wrap.querySelectorAll('[data-demote]').forEach(b=> b.addEventListener('click', ()=> shiftRank(+b.dataset.demote,1)));

  function shiftRank(idx, dir){
    const t = testers[idx];
    const ranks = ATL_DATA.TESTER_RANKS; // 0 = Testing Manager (highest)
    const newIdx = Math.min(ranks.length-1, Math.max(0, ranks.indexOf(t.rank)+dir));
    t.rank = ranks[newIdx];
    ATL_SESSION.saveStore('testers', testers);
    audit(dir<0?'Promoted tester':'Demoted tester', `${t.display||t.username} → ${t.rank}`);
    ATL_toast(`${t.display||t.username} is now ${t.rank}.`, 'success');
    renderTesters();
  }

  function testerForm(existing, idx){
    openModal(`
      <div class="modal-head"><h3>${existing?'Edit Tester':'Add Tester'}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="field"><label>Discord username</label><input class="input" id="tUsername" value="${existing?existing.username:''}" placeholder="e.g. nyx_tests"></div>
      <div class="field"><label>Display name</label><input class="input" id="tDisplay" value="${existing?existing.display||'':''}" placeholder="e.g. Nyx"></div>
      <div class="field"><label>Tester rank</label><select class="select" id="tRank">${ATL_DATA.TESTER_RANKS.map(r=>`<option ${existing&&existing.rank===r?'selected':''}>${r}</option>`).join('')}</select></div>
      <div class="field"><label>Assign gamemodes</label>
        <div style="display:flex; flex-wrap:wrap; gap:8px;">
          ${ATL_DATA.GAMEMODES.map(g=>`<label class="checkbox-row" style="background:var(--panel-2); padding:6px 10px; border-radius:var(--r-full); border:1px solid var(--glass-brd);">
            <input type="checkbox" value="${g.id}" ${existing&&(existing.gamemodes||[]).includes(g.id)?'checked':''}> <span>${g.label}</span>
          </label>`).join('')}
        </div>
      </div>
      <button class="btn btn-secondary btn-block mt-16" id="saveTester">${existing?'Save changes':'Add Tester'}</button>
    `);
    document.getElementById('saveTester').addEventListener('click', ()=>{
      const username = document.getElementById('tUsername').value.trim();
      if(!username){ ATL_toast('Enter a Discord username.', 'error'); return; }
      const gamemodes = Array.from(document.querySelectorAll('#formModalInner input[type=checkbox]:checked')).map(c=>c.value);
      const entry = { username, display: document.getElementById('tDisplay').value.trim()||username, rank: document.getElementById('tRank').value, gamemodes };
      let list = ATL_SESSION.loadStore('testers', []);
      if(existing!=null && idx!=null) list[idx]=entry; else list.push(entry);
      ATL_SESSION.saveStore('testers', list);
      audit(existing?'Edited tester':'Added tester', entry.display);
      closeModal(); ATL_toast(existing?'Tester updated.':'Tester added.', 'success');
      renderTesters();
    });
  }
}

/* ---------------- ANNOUNCEMENTS ---------------- */
function renderAnnouncements(){
  const items = ATL_SESSION.loadStore('announcements', []);
  const el = document.getElementById('view-announcements');
  el.innerHTML = `
    <div class="glass card">
      <div class="eyebrow">New post</div>
      <div class="field mt-16"><label>Title</label><input class="input" id="aTitle" placeholder="Season 4 begins"></div>
      <div class="field"><label>Tag</label><select class="select" id="aTag"><option value="update">update</option><option value="event">event</option><option value="maintenance">maintenance</option></select></div>
      <div class="field"><label>Body</label><textarea class="textarea" id="aBody" placeholder="What's happening..."></textarea></div>
      <button class="btn btn-primary" id="postAnn">Publish Announcement</button>
    </div>
    <div class="mt-24" style="display:flex; flex-direction:column; gap:12px;" id="annList"></div>`;
  const list = document.getElementById('annList');
  list.innerHTML = items.length ? items.slice().reverse().map((a,ri)=>{
    const i = items.length-1-ri;
    return `<div class="glass card"><div class="flex-between"><div><span class="pill pill-blue">${a.tag}</span><h4 class="mt-8">${a.title}</h4></div><button class="btn btn-outline-red btn-sm" data-del="${i}" style="text-transform:none;">Delete</button></div><p class="text-sm text-muted">${a.body}</p></div>`;
  }).join('') : '<p class="text-sm text-muted">No announcements posted yet.</p>';
  list.querySelectorAll('[data-del]').forEach(b=> b.addEventListener('click', ()=>{
    const updated = items.filter((_,i)=>i!==+b.dataset.del);
    ATL_SESSION.saveStore('announcements', updated);
    audit('Deleted announcement', items[+b.dataset.del].title);
    ATL_toast('Announcement deleted.', 'success');
    renderAnnouncements();
  }));
  document.getElementById('postAnn').addEventListener('click', ()=>{
    const title = document.getElementById('aTitle').value.trim();
    const body = document.getElementById('aBody').value.trim();
    if(!title||!body){ ATL_toast('Fill in a title and body.', 'error'); return; }
    items.push({ title, body, tag: document.getElementById('aTag').value, author: session.user.display, date: new Date().toISOString().slice(0,10) });
    ATL_SESSION.saveStore('announcements', items);
    audit('Posted announcement', title);
    ATL_toast('Announcement published.', 'success');
    renderAnnouncements();
  });
}

/* ---------------- REVIEWS MODERATION ---------------- */
function renderReviewsMod(){
  const reviews = ATL_SESSION.loadStore('reviews', []);
  const el = document.getElementById('view-reviews');
  el.innerHTML = `<div class="table-wrap glass" id="revWrap"></div>`;
  const wrap = document.getElementById('revWrap');
  wrap.innerHTML = reviews.length ? `<table class="dt"><thead><tr><th>Member</th><th>Rating</th><th>Review</th><th>Date</th><th></th></tr></thead>
  <tbody>${reviews.map((r,i)=>`<tr><td>${r.display}</td><td class="mono">${r.rating}★</td><td class="text-muted" style="max-width:260px;">${r.body}</td><td class="mono text-muted">${r.date}</td><td><button class="btn btn-outline-red btn-sm" data-del="${i}" style="text-transform:none;">Remove</button></td></tr>`).join('')}</tbody></table>`
  : `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M12 17.3 6.2 20l1.1-6.5L2.5 9l6.5-1L12 2l3 6 6.5 1-4.8 4.5 1.1 6.5z"/></svg><h3>No reviews to moderate</h3><p>Reviews submitted by members will appear here.</p></div>`;
  wrap.querySelectorAll('[data-del]').forEach(b=> b.addEventListener('click', ()=>{
    const removed = reviews[+b.dataset.del];
    ATL_SESSION.saveStore('reviews', reviews.filter((_,i)=>i!==+b.dataset.del));
    audit('Removed review', removed.display);
    ATL_toast('Review removed.', 'success');
    renderReviewsMod();
  }));
}

/* ---------------- LEADERBOARDS MOD ---------------- */
function renderLeaderboardsMod(){
  const el = document.getElementById('view-leaderboards');
  el.innerHTML = `<div id="lbGmTabs" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;"></div><div class="table-wrap glass" id="lbModWrap"></div>`;
  let active = ATL_DATA.GAMEMODES[0].id;
  function draw(){
    document.getElementById('lbGmTabs').innerHTML = ATL_DATA.GAMEMODES.map(g=>`<button class="btn ${g.id===active?'btn-secondary':'btn-ghost'} btn-sm" data-gm="${g.id}" style="text-transform:none;">${g.label}</button>`).join('');
    document.querySelectorAll('#lbGmTabs [data-gm]').forEach(b=> b.addEventListener('click', ()=>{ active=b.dataset.gm; draw(); }));
    const board = ATL_SESSION.loadStore('leaderboard_'+active, []);
    const wrap = document.getElementById('lbModWrap');
    wrap.innerHTML = board.length ? `<table class="dt"><thead><tr><th>Player</th><th>Tier</th><th>Tester</th><th>Date</th><th></th></tr></thead>
      <tbody>${board.map((p,i)=>`<tr><td>${p.player}</td><td>${ATL_hex(p.tier,'sm')}</td><td class="text-muted">${p.tester}</td><td class="mono text-muted">${p.date}</td><td><button class="btn btn-outline-red btn-sm" data-del="${i}" style="text-transform:none;">Remove</button></td></tr>`).join('')}</tbody></table>`
      : `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M4 20V10M12 20V4M20 20v-7"/></svg><h3>Empty board</h3><p>No entries logged for ${ATL_DATA.GAMEMODES.find(g=>g.id===active).label} yet.</p></div>`;
    wrap.querySelectorAll('[data-del]').forEach(b=> b.addEventListener('click', ()=>{
      const updated = board.filter((_,i)=>i!==+b.dataset.del);
      ATL_SESSION.saveStore('leaderboard_'+active, updated);
      audit('Removed leaderboard entry', active);
      ATL_toast('Entry removed.', 'success');
      draw();
    }));
  }
  draw();
}

/* ---------------- RULES MOD ---------------- */
function renderRulesMod(){
  document.getElementById('view-rules').innerHTML = `

      <div class="eyebrow">Content management</div>
      <h3 class="mt-8">Rules page</h3>
      <p class="text-sm text-muted">Rules sections are maintained directly in the Rules page template for consistency and version control. Connect a backend endpoint here to make them editable from this panel without a redeploy.</p>

/* ---------------- SETTINGS ---------------- */
function renderSettings(){
  const s = ATL_SESSION.loadStore('website_settings', { siteName:'Asian Tier List', maintenance:false, registrationOpen:true });
  document.getElementById('view-settings').innerHTML = `
    <div class="glass card" style="max-width:520px;">
      <div class="eyebrow">Website settings</div>
      <div class="field mt-16"><label>Site name</label><input class="input" id="stSiteName" value="${s.siteName}"></div>
      <div class="field checkbox-row"><input type="checkbox" id="stMaint" ${s.maintenance?'checked':''}><span>Enable maintenance mode</span></div>
      <div class="field checkbox-row"><input type="checkbox" id="stReg" ${s.registrationOpen?'checked':''}><span>Allow new test requests</span></div>
      <button class="btn btn-primary" id="saveSettings">Save Settings</button>
    </div>`;
  document.getElementById('saveSettings').addEventListener('click', ()=>{
    const updated = { siteName: document.getElementById('stSiteName').value.trim()||'Asian Tier List', maintenance: document.getElementById('stMaint').checked, registrationOpen: document.getElementById('stReg').checked };
    ATL_SESSION.saveStore('website_settings', updated);
    audit('Updated website settings', JSON.stringify(updated));
    ATL_toast('Settings saved.', 'success');
  });
}

/* ---------------- AUDIT LOG ---------------- */
function renderAudit(){
  const log = ATL_SESSION.loadStore('audit_log', []).slice().reverse();
  document.getElementById('view-audit').innerHTML = `<div class="table-wrap glass">${log.length ? `<table class="dt"><thead><tr><th>Action</th><th>Detail</th><th>Actor</th><th>When</th></tr></thead><tbody>${log.map(a=>`<tr><td>${a.action}</td><td class="text-muted">${a.detail}</td><td>${a.actor}</td><td class="mono text-muted">${a.date}</td></tr>`).join('')}</tbody></table>` : `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 12h18M3 6h18M3 18h18"/></svg><h3>No actions logged</h3><p>Every change you make in this panel is recorded here.</p></div>`}</div>`;
}
