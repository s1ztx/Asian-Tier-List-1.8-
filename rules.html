<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rules — Asian Tier List [1.8+]</title>
<meta name="description" content="Testing rules, conduct standards, and tier retest policy for Asian Tier List.">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<main>
  <section class="page-hero">
    <div class="container">
      <div class="eyebrow">Standards &amp; conduct</div>
      <h1 class="h-title" style="font-size:clamp(32px,5vw,52px);">Rules</h1>
      <p class="h-sub" style="font-size:16px; max-width:640px;">These rules govern testing sessions, tier placement, and member conduct across the platform and Discord server. Violations can result in tier resets, suspension, or removal.</p>
    </div>
  </section>

  <section class="section">
    <div class="container" style="display:grid; grid-template-columns: 240px 1fr; gap:32px;">
      <aside class="glass card" style="align-self:flex-start; position:sticky; top:calc(var(--nav-h)+20px);">
        <div class="eyebrow" style="margin-bottom:12px;">On this page</div>
        <nav id="rulesToc" style="display:flex; flex-direction:column; gap:2px;"></nav>
      </aside>

      <div id="rulesBody" style="display:flex; flex-direction:column; gap:22px;"></div>
    </div>
  </section>
</main>

<style>
  @media (max-width: 860px){
    main .container[style*="grid-template-columns"]{ grid-template-columns: 1fr !important; }
    aside.glass{ position:relative !important; top:0 !important; }
  }
  .rule-item{ display:flex; gap:14px; padding:14px 0; border-bottom:1px solid var(--hairline); }
  .rule-item:last-child{ border-bottom:none; }
  .rule-num{ font-family:var(--f-mono); color:var(--text-3); font-size:13px; min-width:28px; }
  .toc-link{ font-family:var(--f-sub); font-size:13.5px; font-weight:600; color:var(--text-2); padding:8px 10px; border-radius:var(--r-xs); }
  .toc-link:hover{ color:var(--text-0); background:rgba(255,255,255,.04); }
</style>

<script src="assets/js/data.js"></script>
<script src="assets/js/session.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/backgrounds.js"></script>
<script>
  ATL_mountBackground('rules');
  ATL_initShell('rules.html');

  const SECTIONS = [
    { id:'testing', title:'Testing conduct', rules:[
      'Test requests are handled in the order they are received unless a Testing Manager reassigns priority.',
      'Both the Tester and the candidate must be present and ready before a session starts; no-shows may forfeit the request.',
      'Recording the session (screen or replay) may be requested by either party and cannot be refused without reason.',
      'A Tester may pause or end a session early if they suspect cheating, disconnect abuse, or unsafe conduct.'
    ]},
    { id:'placement', title:'Tier placement', rules:[
      'Only the fourteen official tiers (S, S-, A+, A, A-, B+, B, B-, C+, C, C-, D+, D, D-) may ever be assigned.',
      'Tiers are assigned per gamemode. Your overall tier reflects your highest-performing gamemode.',
      'A tier decision is final once logged unless a formal retest is approved.',
      'Testers must record the assignment date and their own name against every tier they issue.'
    ]},
    { id:'retest', title:'Retest policy', rules:[
      'A retest may be requested no earlier than 14 days after your last result in that gamemode.',
      'Retest requests citing meta changes, gear changes, or a documented improvement period are prioritized.',
      'Abuse of the retest system (spamming requests) can result in a temporary testing freeze.'
    ]},
    { id:'conduct', title:'Member conduct', rules:[
      'Harassment, hate speech, or targeted abuse toward staff, testers, or members is never tolerated.',
      'Impersonating staff, testers, or the Founder account is grounds for immediate suspension.',
      'Do not share, sell, or trade tier placements or accounts.',
      'Respect decisions made by Senior Moderators and above; disputes go through the appeals process, not public callouts.'
    ]},
    { id:'appeals', title:'Appeals', rules:[
      'Tier or moderation appeals are submitted through a ticket in the Discord server, not in public channels.',
      'Appeals are reviewed by a Manager or higher and are never handled by the original Tester alone.',
      'Decisions on appeals are final for that submission; a new appeal requires new evidence.'
    ]}
  ];

  document.getElementById('rulesToc').innerHTML = SECTIONS.map(s=>`<a class="toc-link" href="#${s.id}">${s.title}</a>`).join('');
  document.getElementById('rulesBody').innerHTML = SECTIONS.map(s=>`
    <div class="glass card" id="${s.id}">
      <h3 style="font-size:20px;">${s.title}</h3>
      <div class="mt-16">
        ${s.rules.map((r,i)=>`<div class="rule-item"><span class="rule-num">${String(i+1).padStart(2,'0')}</span><span class="text-sm" style="color:var(--text-1);">${r}</span></div>`).join('')}
      </div>
    </div>
  `).join('');
</script>
</body>
</html>
