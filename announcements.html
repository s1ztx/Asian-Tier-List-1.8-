<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Announcements — Asian Tier List [1.8+]</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<main>
  <section class="page-hero">
    <div class="container">
      <div class="eyebrow">Official updates</div>
      <h1 class="h-title" style="font-size:clamp(32px,5vw,52px);">Announcements</h1>
      <p class="h-sub">Season changes, maintenance windows, and platform news, posted directly by staff.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div id="announcementList" style="display:flex; flex-direction:column; gap:16px;"></div>
    </div>
  </section>
</main>

<script src="assets/js/data.js"></script>
<script src="assets/js/session.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/backgrounds.js"></script>
<script>
  ATL_mountBackground('announcements');
  ATL_initShell('announcements.html');

  const items = ATL_SESSION.loadStore('announcements', []);
  const list = document.getElementById('announcementList');

  if(items.length === 0){
    list.innerHTML = `
      <div class="glass empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M4 4h16v12H7l-3 3z"/></svg>
        <h3>No announcements yet</h3>
        <p>Staff haven't posted anything here. Once an update goes live from the Owner Panel, it'll appear at the top of this page.</p>
      </div>`;
  } else {
    list.innerHTML = items.slice().reverse().map(a=>`
      <div class="glass card">
        <div class="flex-between" style="align-items:flex-start;">
          <div>
            <span class="pill pill-${a.tag==='maintenance'?'blue':a.tag==='event'?'gold':'red'}">${a.tag}</span>
            <h3 style="margin-top:12px; font-size:19px;">${a.title}</h3>
          </div>
          <span class="text-sm text-muted mono">${a.date}</span>
        </div>
        <p class="text-sm" style="color:var(--text-1);">${a.body}</p>
        <div class="text-sm text-muted">— ${a.author}</div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
