<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting Discord — Asian Tier List [1.8+]</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<main>
  <section style="min-height:80vh; display:flex; align-items:center;">
    <div class="container" style="max-width:560px;">
      <div class="glass card" style="text-align:center;">
        <div class="eyebrow" style="justify-content:center;">Discord OAuth2</div>
        <h2 class="mt-8" id="cbHeading">Finishing sign-in…</h2>
        <p class="text-sm text-muted mt-16" id="cbMessage">Reading the session from the authentication service.</p>
        <div class="mt-24">
          <a href="index.html" class="btn btn-ghost" id="cbHomeLink">Return to Home</a>
        </div>
      </div>
    </div>
  </section>
</main>
<script src="assets/js/session.js"></script>
<script>
  const heading = document.getElementById('cbHeading');
  const msg = document.getElementById('cbMessage');
  const result = ATL_SESSION.consumeCallbackHash();

  if(result.ok){
    heading.textContent = `Welcome, ${result.session.user.display}`;
    msg.textContent = `Signed in as ${result.session.role}. Redirecting to your profile…`;
    setTimeout(()=>{ window.location.href = 'profile.html'; }, 900);
  } else {
    const messages = {
      access_denied: 'You declined the Discord authorization. You can close this tab or try again.',
      missing_code: 'No authorization code was returned. Start the login flow again from the Home page.',
      invalid_state: 'This sign-in attempt could not be verified (expired or reused link). Please try logging in again.',
      token_exchange_failed: 'Discord rejected the token exchange. Check the Worker\'s Client ID/Secret configuration.',
      identify_failed: 'Could not read your Discord identity. Please try again.',
      no_session: 'No session was found in this link. Start the login flow again from the Home page.',
      decode_failed: 'The session data was malformed. Please try logging in again.'
    };
    heading.textContent = 'Sign-in didn\'t complete';
    msg.textContent = messages[result.error] || ('Something went wrong: ' + result.error);
  }
</script>
</body>
</html>
